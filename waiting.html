<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في الانتظار — هارت سينك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .waiting-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
    </style>
</head>

<body class="hero-gradient-bg">
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">
                <span class="heart-icon">💑</span> هارت سينك
            </a>
            <div class="nav-actions">
                <span class="nav-name"></span>
            </div>
        </div>
    </nav>

    <main class="waiting-main" style="position:relative;z-index:1">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>جاري التحقق...</p>
        </div>

        <div id="waiting-content" class="hidden card text-center" style="max-width:480px;width:100%;padding:56px 40px">
            <!-- Pulse animation -->
            <div class="pulse-container" style="width:120px;height:120px;margin:0 auto 32px">
                <div class="pulse-ring"></div>
                <div class="pulse-ring pulse-ring-2"></div>
                <div style="font-size:3.5rem">💑</div>
            </div>

            <h1 class="fw-black gradient-text mb-12" style="font-size:1.8rem">بانتظار شريكك...</h1>
            <p class="text-muted mb-32">أكملت إجاباتك! ننتظر حتى يكمل شريكك إجاباته<br>لنكشف لكما النتيجة معاً 💜</p>

            <div class="waiting-hearts mb-32">
                <span class="waiting-heart">💜</span>
                <span class="waiting-heart">💗</span>
                <span class="waiting-heart">💜</span>
            </div>

            <!-- Status indicators -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px">
                <div class="stat-card" style="padding:16px">
                    <div style="font-size:1.5rem;margin-bottom:4px">✅</div>
                    <div class="text-sm fw-bold" id="my-status-label">أنت</div>
                    <div class="text-xs text-muted mt-4">اكتمل</div>
                </div>
                <div class="stat-card" id="partner-card" style="padding:16px">
                    <div style="font-size:1.5rem;margin-bottom:4px" id="partner-icon">⏳</div>
                    <div class="text-sm fw-bold">شريكك</div>
                    <div class="text-xs text-muted mt-4" id="partner-status">في تقدم...</div>
                </div>
            </div>

            <p class="text-xs text-muted">
                <span id="poll-status">يتم التحقق تلقائياً كل 5 ثوانٍ...</span>
            </p>
        </div>
    </main>

    <script type="module">
        import { requireAuth, renderNavUser, showToast } from './js/auth.js';
        import { getRoom } from './js/rooms.js';
        import supabase from './js/supabase.js';

        let roomId = null;
        let pollTimer = null;

        async function init() {
            const user = await requireAuth();
            if (!user) return;
            renderNavUser(user);

            const params = new URLSearchParams(location.search);
            roomId = params.get('room');
            if (!roomId) { location.href = 'dashboard.html'; return; }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('waiting-content').classList.remove('hidden');
            document.getElementById('waiting-content').classList.add('animate-scaleIn');

            // Check immediately
            await checkStatus();
        }

        async function checkStatus() {
            const { data: room } = await supabase
                .from('rooms')
                .select('status, creator_done, partner_done')
                .eq('id', roomId)
                .single();

            if (!room) return;

            if (room.status === 'completed') {
                document.getElementById('partner-icon').textContent = '✅';
                document.getElementById('partner-status').textContent = 'اكتمل!';
                document.getElementById('partner-card').style.borderColor = 'rgba(52,211,153,0.4)';
                document.getElementById('poll-status').textContent = 'اكتملت الإجابات! جاري الانتقال...';
                showToast('اكتمل كلاكما! جاري الكشف عن النتيجة 🎉', 'success');
                setTimeout(() => { location.href = `results.html?room=${roomId}`; }, 1800);
                return;
            }

            // Schedule next check
            pollTimer = setTimeout(checkStatus, 5000);
        }

        // Also subscribe via Supabase Realtime for instant update
        async function subscribeRealtime() {
            supabase
                .channel(`room-${roomId}`)
                .on('postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` },
                    (payload) => {
                        if (payload.new?.status === 'completed') {
                            clearTimeout(pollTimer);
                            checkStatus();
                        }
                    })
                .subscribe();
        }

        init().then(subscribeRealtime);
    </script>
</body>

</html>
