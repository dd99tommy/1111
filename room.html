<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسئلة — هارت سينك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">
                <span class="heart-icon">💑</span> هارت سينك
            </a>
            <div class="nav-actions">
                <img class="nav-avatar" src="" alt="" style="display:none">
                <span class="nav-name"></span>
                <button id="logout-btn" class="btn btn-outline btn-sm">خروج</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding:40px 24px 80px;position:relative;z-index:1;max-width:680px">
        <div id="loading-state" class="loading-state">
            <div class="spinner"></div>
            <p>جاري تحضير الأسئلة...</p>
        </div>

        <!-- Status: waiting for partner to join -->
        <div id="waiting-partner" class="hidden card text-center" style="padding:48px">
            <div style="font-size:4rem;margin-bottom:16px" class="animate-float">📨</div>
            <h2 class="fw-black mb-8">غرفتك جاهزة!</h2>
            <p class="text-muted mb-24">في انتظار انضمام شريكك عبر رابط الدعوة</p>
            <div id="invite-display" class="invite-box mb-16">
                <span class="invite-link" id="room-invite-link"></span>
                <button id="copy-invite-btn" class="btn btn-sm btn-outline" style="flex-shrink:0">نسخ</button>
            </div>
            <p class="text-xs text-muted">سيُفعَّل بدء الأسئلة بمجرد انضمام شريكك</p>
            <div class="waiting-hearts mt-24">
                <span class="waiting-heart">💜</span>
                <span class="waiting-heart">💗</span>
                <span class="waiting-heart">💜</span>
            </div>
        </div>

        <!-- Already completed -->
        <div id="already-done" class="hidden card text-center" style="padding:48px">
            <div style="font-size:4rem;margin-bottom:16px">✅</div>
            <h2 class="fw-black mb-8">أكملت إجاباتك!</h2>
            <p class="text-muted mb-24">في انتظار إكمال شريكك للإجابات...</p>
            <a id="go-waiting-btn" href="#" class="btn btn-primary">انتقل إلى صفحة الانتظار</a>
        </div>

        <!-- Question Container -->
        <div id="question-container" class="hidden"></div>

        <!-- Secret Message Step -->
        <div id="secret-message-step" class="hidden card">
            <div style="font-size:3rem;text-align:center;margin-bottom:16px">💌</div>
            <h2 class="fw-black text-center mb-8">رسالة سرية لشريكك</h2>
            <p class="text-muted text-center text-sm mb-24">ستُكشف هذه الرسالة فقط بعد انتهائكما من الإجابات</p>
            <div class="form-group">
                <textarea id="secret-message-input" class="form-control" rows="5"
                    placeholder="اكتب ما يعبّر عن مشاعرك... (اختياري)"></textarea>
            </div>
            <button id="finish-btn" class="btn btn-primary btn-block btn-lg">
                إنهاء وانتظار النتائج 🎉
            </button>
            <button id="skip-secret-btn" class="btn btn-outline btn-block mt-8">
                تخطّ (بدون رسالة سرية)
            </button>
        </div>
    </main>

    <script type="module">
        import { requireAuth, renderNavUser, signOut, showToast } from './js/auth.js';
        import { getRoom, hasUserFinished, getInviteLink, saveSecretMessage } from './js/rooms.js';
        import { getActiveQuestions, renderQuestion } from './js/questions.js';
        import { saveAnswer, getAnswerCount } from './js/answers.js';
        import supabase from './js/supabase.js';

        let currentUser = null;
        let questions = [];
        let currentIndex = 0;
        let room = null;
        let roomId = null;

        // ── Init ──────────────────────────────────────────────────
        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            renderNavUser(currentUser);

            const params = new URLSearchParams(location.search);
            roomId = params.get('id') || params.get('join');
            if (!roomId) { location.href = 'dashboard.html'; return; }

            // If joining via invite link, handle join
            const isJoining = !!params.get('join');
            if (isJoining) {
                const { joinRoom } = await import('./js/rooms.js');
                try {
                    room = await joinRoom(roomId, currentUser.id);
                    if (!room) return;
                } catch (err) {
                    showToast(err.message, 'error');
                    location.href = 'dashboard.html';
                    return;
                }
                // Update URL to clean id param
                history.replaceState({}, '', `room.html?id=${roomId}`);
            } else {
                room = await getRoom(roomId);
            }

            document.getElementById('loading-state').classList.add('hidden');

            // Room validation
            if (!room) { showToast('الغرفة غير موجودة', 'error'); location.href = 'dashboard.html'; return; }
            if (room.status === 'completed') { location.href = `results.html?room=${roomId}`; return; }

            // Waiting for partner
            if (room.status === 'waiting' && room.created_by === currentUser.id) {
                document.getElementById('waiting-partner').classList.remove('hidden');
                const link = getInviteLink(roomId);
                document.getElementById('room-invite-link').textContent = link;
                pollForPartner();
                return;
            }

            // Check if user already done
            const done = await hasUserFinished(roomId, currentUser.id);
            if (done) {
                document.getElementById('already-done').classList.remove('hidden');
                document.getElementById('go-waiting-btn').href = `waiting.html?room=${roomId}`;
                return;
            }

            // Load questions
            questions = await getActiveQuestions();
            if (!questions.length) {
                showToast('لا توجد أسئلة نشطة بعد', 'error');
                location.href = 'dashboard.html';
                return;
            }

            // Find which question to start at (resume)
            const answered = await getAnswerCount(roomId, currentUser.id);
            currentIndex = Math.min(answered, questions.length - 1);

            document.getElementById('question-container').classList.remove('hidden');
            showQuestion(currentIndex);
        }

        // ── Show Question ─────────────────────────────────────────
        function showQuestion(index) {
            const container = document.getElementById('question-container');
            if (index >= questions.length) {
                // All answered → show secret message step
                container.classList.add('hidden');
                document.getElementById('secret-message-step').classList.remove('hidden');
                document.getElementById('secret-message-step').classList.add('animate-scaleIn');
                return;
            }

            const nextBtn = renderQuestion(questions[index], index, questions.length, container);
            nextBtn.addEventListener('click', async () => {
                // Get answer value
                const ansInput = container.querySelector('#answer-input');
                const value = typeof ansInput.getValue === 'function' ? ansInput.getValue() : null;
                if (!value) { showToast('الرجاء اختيار إجابة', 'error'); return; }

                nextBtn.disabled = true;
                nextBtn.textContent = 'جاري الحفظ...';
                try {
                    await saveAnswer(roomId, currentUser.id, questions[index].id, value);
                    currentIndex = index + 1;
                    showQuestion(currentIndex);
                } catch (err) {
                    showToast('فشل الحفظ: ' + err.message, 'error');
                    nextBtn.disabled = false;
                    nextBtn.textContent = index === questions.length - 1 ? 'إنهاء الإجابات ✓' : 'السؤال التالي ←';
                }
            });
        }

        // ── Finish & Secret Message ───────────────────────────────
        async function finishAnswering(withMessage) {
            const btn = document.getElementById('finish-btn');
            const skipBtn = document.getElementById('skip-secret-btn');
            btn.disabled = true;
            skipBtn.disabled = true;
            btn.textContent = 'جاري الإنهاء...';

            try {
                if (withMessage) {
                    const msg = document.getElementById('secret-message-input').value.trim();
                    if (msg) await saveSecretMessage(roomId, currentUser.id, room.created_by, msg);
                }
                showToast('رائع! تم إنهاء إجاباتك 💜', 'success');
                setTimeout(() => { location.href = `waiting.html?room=${roomId}`; }, 800);
            } catch (err) {
                showToast('حدث خطأ: ' + err.message, 'error');
                btn.disabled = false;
                skipBtn.disabled = false;
                btn.textContent = 'إنهاء وانتظار النتائج 🎉';
            }
        }

        document.getElementById('finish-btn')?.addEventListener('click', () => finishAnswering(true));
        document.getElementById('skip-secret-btn')?.addEventListener('click', () => finishAnswering(false));
        document.getElementById('copy-invite-btn')?.addEventListener('click', () => {
            const link = document.getElementById('room-invite-link').textContent;
            navigator.clipboard.writeText(link).then(() => showToast('تم نسخ الرابط!', 'success'));
        });
        document.getElementById('logout-btn').addEventListener('click', signOut);

        // ── Poll for partner joining ───────────────────────────────
        async function pollForPartner() {
            const check = async () => {
                const { data } = await supabase.from('rooms').select('status,partner_id').eq('id', roomId).single();
                if (data?.partner_id) {
                    showToast('انضم الشريك! يمكنك الآن البدء 💜', 'success');
                    setTimeout(() => location.reload(), 1000);
                } else {
                    setTimeout(check, 5000);
                }
            };
            setTimeout(check, 5000);
        }

        init();
    </script>
</body>

</html>
